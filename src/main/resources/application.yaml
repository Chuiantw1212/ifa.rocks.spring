# Main/Production Configuration
server:
  port: ${PORT:8080}
  # Tell Spring Boot to trust the X-Forwarded-* headers from the reverse proxy (Cloud Run)
  forward-headers-strategy: NATIVE

spring:
  # Always try to include the 'local' profile.
  profiles:
    include: local

  application:
    name: ifa.rocks.spring
  
  datasource:
    url: jdbc:postgresql://ep-tiny-scene-a17efgr6-pooler.ap-southeast-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
    username: neondb_owner
    password: ${DB_PASSWORD:?DB_PASSWORD environment variable is not set}
    driver-class-name: org.postgresql.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: rocks.ifa.spring.model

# Production CORS settings
app:
  cors:
    allowed-origins:
      - https://ifa.rocks

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

springdoc:
  show-actuator: true