# Google Cloud Buildpacks Project Descriptor
# This file instructs Google Cloud Buildpacks which settings to use for the build.

# Set a schema version for the project descriptor file.
schema-version = "0.2"

# Define the buildpacks to be used. By explicitly listing them, we ensure a consistent build process.
[[build.buildpacks]]
id = "google.java.runtime"

[[build.buildpacks]]
id = "google.java.maven"

# Define environment variables for the build process.
# This section uses an "array of tables" TOML syntax.
[[build.env]]
# This is the crucial instruction that locks the Java version.
# It forces the build environment to use Java 21, matching your local setup.
name = "GOOGLE_RUNTIME_VERSION"
value = "21"
