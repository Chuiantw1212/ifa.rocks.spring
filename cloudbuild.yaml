# This file defines the CI/CD pipeline for Google Cloud Build.
# It uses Cloud Native Buildpacks to create a container image without a Dockerfile.

steps:
  # This step builds the application into a container image.
  - name: 'gcr.io/k8s-skaffold/pack'
    entrypoint: 'pack'
    args:
      - 'build'
      # IMPORTANT: Replace this with your actual image name in Google Artifact Registry.
      - 'asia-east1-docker.pkg.dev/YOUR_PROJECT_ID/YOUR_REPO_NAME/ifa-rocks-spring:latest'
      
      # Use the recommended, up-to-date builder for Google Cloud.
      - '--builder=gcr.io/buildpacks/builder:google-24'
      
      - '--path=.'
      
      # Lock the Java version to ensure consistency between local and cloud environments.
      - '--env=GOOGLE_RUNTIME_VERSION=21'
      
      # This is the crucial fix:
      # Force a clean build by clearing any cached layers from previous failed builds.
      - '--clear-cache'

# After the build step is successful, Cloud Build will automatically push the resulting
# container image to the specified Artifact Registry repository.
images:
  - 'asia-east1-docker.pkg.dev/YOUR_PROJECT_ID/YOUR_REPO_NAME/ifa-rocks-spring:latest'

options:
  logging: CLOUD_LOGGING_ONLY
