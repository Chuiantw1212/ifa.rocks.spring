# This file defines the complete, secure, and robust CI/CD pipeline.
# It uses Secret Manager to handle database credentials, which is the best practice.

steps:
  # STEP 1: Build the application image.
  - name: 'gcr.io/k8s-skaffold/pack'
    id: 'Build'
    entrypoint: 'pack'
    args:
      - 'build'
      - 'asia-east1-docker.pkg.dev/ifa-rocks/cloud-run-source-deploy/ifa-rocks:$SHORT_SHA'
      - '--builder=gcr.io/buildpacks/builder:google-24'
      - '--path=.'
      - '--env=GOOGLE_RUNTIME_VERSION=21'
      - '--clear-cache'

  # STEP 2: Explicitly push the image to Artifact Registry.
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push'
    entrypoint: 'docker'
    args:
      - 'push'
      - 'asia-east1-docker.pkg.dev/ifa-rocks/cloud-run-source-deploy/ifa-rocks:$SHORT_SHA'
    waitFor: ['Build']

  # STEP 3: Deploy the image to Cloud Run, mounting secrets as environment variables.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'ifa-rocks' # Your Cloud Run service name
      - '--image=asia-east1-docker.pkg.dev/ifa-rocks/cloud-run-source-deploy/ifa-rocks:$SHORT_SHA'
      - '--region=asia-east1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      # CRITICAL SECURITY FIX: Mount secrets as environment variables.
      # This command tells Cloud Run to fetch the latest version of the specified secrets
      # from Secret Manager and expose them to the container as environment variables.
      - '--set-secrets=DATASOURCE_URL=NEON_DB_URL:latest,DATASOURCE_PASSWORD=NEON_DB_PASSWORD:latest'
    waitFor: ['Push']

images:
  - 'asia-east1-docker.pkg.dev/ifa-rocks/cloud-run-source-deploy/ifa-rocks:$SHORT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
