# This file defines the CI/CD pipeline for Google Cloud Build.
steps:
  - name: 'gcr.io/k8s-skaffold/pack'
    entrypoint: 'pack'
    args:
      - 'build'
      # The image name now uses the short Git commit SHA as the tag for unique versioning.
      - 'asia-east1-docker.pkg.dev/ifa-rocks/cloud-run-source-deploy/ifa-rocks-spring:$SHORT_SHA'
      - '--builder=gcr.io/buildpacks/builder:google-24'
      - '--path=.'
      - '--env=GOOGLE_RUNTIME_VERSION=21'
      - '--clear-cache'

images:
  - 'asia-east1-docker.pkg.dev/ifa-rocks/cloud-run-source-deploy/ifa-rocks-spring:$SHORT_SHA'

# This step deploys the newly built image to Cloud Run, ensuring the latest version is used.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'ifa-rocks-spring' # Replace with your Cloud Run service name if different
      - '--image=asia-east1-docker.pkg.dev/ifa-rocks/cloud-run-source-deploy/ifa-rocks-spring:$SHORT_SHA'
      - '--region=asia-east1'
      - '--platform=managed'
      - '--allow-unauthenticated' # Keep if your service is public, otherwise remove

options:
  logging: CLOUD_LOGGING_ONLY
