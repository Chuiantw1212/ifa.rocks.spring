# This file defines the CI/CD pipeline based on the official Google Cloud Build default configuration.
# It correctly uses 'pack build --publish' and 'gcloud run services update'.

steps:
  # STEP 1: Atomically build the application image and publish it to Artifact Registry.
  # The '--publish' flag handles both building and pushing in one step, avoiding race conditions.
  - name: 'gcr.io/k8s-skaffold/pack'
    id: 'Build and Publish'
    entrypoint: 'pack'
    args:
      - 'build'
      # This uses the built-in substitution variables for the image name.
      - '$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:$COMMIT_SHA'
      - '--builder=gcr.io/buildpacks/builder:google-24' # Using a pinned, stable builder
      - '--path=.'
      - '--publish' # This is the key to build and push atomically.
      # This is a safety measure to prevent silent Java version upgrades in the build environment.
      - '--env=GOOGLE_RUNTIME_VERSION=21'
      - '--clear-cache'

  # STEP 2: Update the Cloud Run service to use the newly published image.
  # The 'gcloud run services update' command safely inherits existing environment variables
  # from the service, which is the desired behavior.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'services'
      - 'update'
      - '$_SERVICE_NAME'
      - '--platform=managed'
      - '--image=$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:$COMMIT_SHA'
      - '--region=$_DEPLOY_REGION'
      - '--quiet'
    # This ensures the deploy step only runs after the image has been successfully built and published.
    waitFor: ['Build and Publish']

# This section is still useful as it allows Cloud Build to track the produced artifacts.
images:
  - '$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPOSITORY/$_SERVICE_NAME:$COMMIT_SHA'

# Define the substitution variables that will be used in the steps above.
# These values are typically configured in the Cloud Build Trigger settings.
substitutions:
  _SERVICE_NAME: 'ifa-rocks-spring'
  _DEPLOY_REGION: 'asia-east1'
  _AR_HOSTNAME: 'asia-east1-docker.pkg.dev'
  _AR_REPOSITORY: 'cloud-run-source-deploy'

options:
  logging: CLOUD_LOGGING_ONLY
