# This file defines the complete, robust CI/CD pipeline for Google Cloud Build.
steps:
  # STEP 1: Build the application image.
  - name: 'gcr.io/k8s-skaffold/pack'
    id: 'Build'
    entrypoint: 'pack'
    args:
      - 'build'
      - 'asia-east1-docker.pkg.dev/ifa-rocks/cloud-run-source-deploy/ifa-rocks-spring:$SHORT_SHA'
      - '--builder=gcr.io/buildpacks/builder:google-24'
      - '--path=.'
      - '--env=GOOGLE_RUNTIME_VERSION=21'
      - '--clear-cache'

  # STEP 2: Explicitly push the image to Artifact Registry.
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push'
    entrypoint: 'docker'
    args:
      - 'push'
      - 'asia-east1-docker.pkg.dev/ifa-rocks/cloud-run-source-deploy/ifa-rocks-spring:$SHORT_SHA'
    waitFor: ['Build']

  # STEP 3: Deploy the image to Cloud Run with necessary environment variables.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'ifa-rocks-spring'
      - '--image=asia-east1-docker.pkg.dev/ifa-rocks/cloud-run-source-deploy/ifa-rocks-spring:$SHORT_SHA'
      - '--region=asia-east1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      # CRITICAL FIX: Set the database environment variables required by the application to start.
      # IMPORTANT: Replace the placeholder values with your actual database credentials.
      # For better security, consider using Secret Manager for the password.
      - '--set-env-vars=DATASOURCE_URL=YOUR_NEON_DB_URL,DATASOURCE_PASSWORD=YOUR_NEON_DB_PASSWORD'
    waitFor: ['Push']

images:
  - 'asia-east1-docker.pkg.dev/ifa-rocks/cloud-run-source-deploy/ifa-rocks-spring:$SHORT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
