# This file defines the complete, robust CI/CD pipeline for Google Cloud Build.
# It follows an explicit Build -> Push -> Deploy sequence.

steps:
  # STEP 1: Build the application into a container image locally within the build environment.
  - name: 'gcr.io/k8s-skaffold/pack'
    id: 'Build'
    entrypoint: 'pack'
    args:
      - 'build'
      # This is the full, final image name that will be used across all steps.
      - 'asia-east1-docker.pkg.dev/ifa-rocks/cloud-run-source-deploy/ifa-rocks-spring:$SHORT_SHA'
      - '--builder=gcr.io/buildpacks/builder:google-24'
      - '--path=.'
      - '--env=GOOGLE_RUNTIME_VERSION=21'
      - '--clear-cache'

  # STEP 2: Explicitly push the newly built image to Artifact Registry.
  # This removes any ambiguity or race conditions with implicit pushes.
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push'
    entrypoint: 'docker'
    args:
      - 'push'
      - 'asia-east1-docker.pkg.dev/ifa-rocks/cloud-run-source-deploy/ifa-rocks-spring:$SHORT_SHA'
    # This step will only run after the 'Build' step has successfully completed.
    waitFor: ['Build']

  # STEP 3: Deploy the image to Cloud Run.
  # This step now waits for the 'Push' step, ensuring the image is available in the registry.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'ifa-rocks-spring' # Your Cloud Run service name
      - '--image=asia-east1-docker.pkg.dev/ifa-rocks/cloud-run-source-deploy/ifa-rocks-spring:$SHORT_SHA'
      - '--region=asia-east1'
      - '--platform=managed'
      - '--allow-unauthenticated'
    # CRITICAL CHANGE: This step now waits for the 'Push' step to complete.
    waitFor: ['Push']

# The 'images' section is now technically redundant because of the explicit 'docker push' step,
# but keeping it is harmless and can be useful for certain Cloud Build features.
images:
  - 'asia-east1-docker.pkg.dev/ifa-rocks/cloud-run-source-deploy/ifa-rocks-spring:$SHORT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
